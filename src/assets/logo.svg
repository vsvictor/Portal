<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Icon: stylized trident/network -->
  <g transform="translate(4, 4)">
    <rect width="52" height="52" rx="10" fill="#1a56a4"/>
    <g fill="#f5c400">
      <!-- trident stem -->
      <rect x="25" y="32" width="4" height="12" rx="2"/>
      <!-- trident base bar -->
      <rect x="18" y="42" width="18" height="3" rx="1.5"/>
      <!-- center prong -->
      <rect x="25" y="12" width="4" height="16" rx="2"/>
      <!-- left prong -->
      <rect x="16" y="12" width="3" height="11" rx="1.5"/>
      <!-- right prong -->
      <rect x="35" y="12" width="3" height="11" rx="1.5"/>
      <!-- left arm -->
      <rect x="16" y="12" width="9" height="3" rx="1.5"/>
      <!-- right arm -->
      <rect x="29" y="12" width="9" height="3" rx="1.5"/>
    </g>
  </g>
  <!-- Text -->
  <text x="68" y="24" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="14" fill="#1a56a4">ДП «Цифрове»</text>
  <text x="68" y="42" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="10" fill="#4a5568">Цифрова держава</text>
  <text x="68" y="54" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="9" fill="#718096">Мінекономіки України</text>
</svg>
